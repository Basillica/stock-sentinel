<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Engine Dashboard</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for lightweight reactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-8 antialiased selection:bg-cyan-500 selection:text-white">

    <div max-w-6xl mx-auto" x-data="oracleDashboard()" x-init="startEngine()">
        
        <!-- Header -->
        <header class="flex justify-between items-center border-b border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                    <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                    Oracle Engine
                </h1>
                <p class="text-slate-400 mt-1">Autonomous market pipeline and trailing-stop protector</p>
            </div>
        </header>

        <!-- Control Panel: Add Ticker -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 mb-8 flex gap-4 items-end shadow-lg">
            <div class="flex-1">
                <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-2">Symbol</label>
                <input type="text" x-model="newSymbol" placeholder="e.g. AMAT" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-white uppercase focus:outline-none focus:border-cyan-500">
            </div>
            <div class="flex-1">
                <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-2">Entry Price ($)</label>
                <input type="number" step="0.01" x-model="entryPrice" placeholder="0.00" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider text-slate-500 font-bold mb-2">Status</label>
                <select x-model="isOwned" class="bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500">
                    <option :value="true">Owned Portfolio</option>
                    <option :value="false">Watchlist</option>
                </select>
            </div>
            <button @click="addTicker()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-lg shadow-cyan-500/20">
                Track Asset
            </button>
        </div>

        <!-- Ticker Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="ticker in tickers" :key="ticker.symbol">
                
                <div class="bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-lg relative group hover:border-slate-600 transition-colors">
                    
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-white" x-text="ticker.symbol"></h2>
                        <span x-show="ticker.is_owned" class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs px-2 py-1 rounded md uppercase font-bold tracking-wider">Portfolio</span>
                        <span x-show="!ticker.is_owned" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-xs px-2 py-1 rounded md uppercase font-bold tracking-wider">Watchlist</span>
                    </div>
                    
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between">
                            <span class="text-slate-400">Entry Price</span>
                            <span class="font-mono text-slate-200" x-text="formatCurrency(ticker.entry_price)"></span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">All-Time High</span>
                            <span class="font-mono text-cyan-400 font-bold text-lg" x-text="formatCurrency(ticker.highest_tracked_price)"></span>
                        </div>
                        
                        <!-- Trailing Stop Math calculated by Alpine -->
                        <div class="flex justify-between items-center pt-3 mt-3 border-t border-slate-800/80">
                            <span class="text-slate-500 font-medium text-xs uppercase tracking-wider">Trailing Stop (15%)</span>
                            <span class="font-mono text-rose-500 font-black text-lg" x-text="formatCurrency(ticker.highest_tracked_price * 0.85)"></span>
                        </div>
                    </div>
                    
                    <button @click="removeTicker(ticker.symbol)" class="absolute top-6 right-6 text-slate-600 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>

                </div>
            </template>
        </div>
    </div>

    <!-- Alpine.js Application Logic -->
    <script>
        function oracleDashboard() {
            return {
                tickers: [],
                newSymbol: '',
                isOwned: true,
                entryPrice: '',
                
                async startEngine() {
                    this.fetchData();
                    // Poll the Axum JSON API every 3 seconds for updates
                    setInterval(() => this.fetchData(), 3000);
                },
                
                async fetchData() {
                    try {
                        const response = await fetch('/api/portfolio');
                        this.tickers = await response.json();
                    } catch (err) {
                        console.error("Failed to fetch engine state", err);
                    }
                },

                async addTicker() {
                    if (!this.newSymbol) return;
                    
                    const payload = {
                        symbol: this.newSymbol.toUpperCase(),
                        is_owned: this.isOwned === 'true' || this.isOwned === true,
                        entry_price: parseFloat(this.entryPrice || 0),
                        highest_tracked_price: parseFloat(this.entryPrice || 0)
                    };

                    await fetch('/api/portfolio', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // Reset form and instantly refresh UI
                    this.newSymbol = '';
                    this.entryPrice = '';
                    this.fetchData();
                },

                async removeTicker(symbol) {
                    await fetch(`/api/portfolio/${symbol}`, { method: 'DELETE' });
                    this.fetchData();
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
                }
            }
        }
    </script>
</body>
</html>
